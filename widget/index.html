<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaliGanAI Widget Test Host</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
      max-width: 560px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    h1 {
      margin-top: 0;
      color: #0e7a5f;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    p {
      color: #475569;
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 24px;
    }
    .status {
      display: inline-block;
      padding: 6px 12px;
      background: #ecfdf5;
      color: #047857;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div style="margin-bottom: 16px;">
      <span class="status">Sandbox Environment</span>
    </div>
    <h1>KaliGanAI Widget Host</h1>
    <p>This site simulates a client website embedding the KaliGanAI chat & voice widget. The floating bubble launcher will appear in the bottom-right corner.</p>
  </div>

  <!-- The widget script will be loaded dynamically by placing a script tag.
       We load the local bundle from the React app dev server (which serves w.js from public/).
       We will dynamically replace the data-key with a real one during verification. -->
  <script src="http://localhost:3000/w.js" data-key="ws_demo_key"></script>
</body>
</html>
