version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kaligan-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaligan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kaligan-network

volumes:
  postgres_data:

networks:
  kaligan-network:
    driver: bridge
